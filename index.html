<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="titel-container">
        <img class="puzzle-icon" src="assets\puzzle (3).png" width="120" height="120">
        <h1 class="titel">Trivia Quiz</h1>
        <p class="subtitel">Welcome to this trivia quiz. Test your knowledge about the world!</p>
    </div>

    <div class="quiz-container" id="quiz-container">
        <h1 class="question-titel" id="question-titel"></h1>
        <div class="quiz-buttons-div" id="quiz-buttons-div">
            <button class="btn"></button>
            <button class="btn"></button>
            <button class="btn"></button>
            <button class="btn"></button>
        </div>

        <div class="next-btn-div">
            <button class="next-btn" id="next-btn">Next Question</button>
        </div>
    </div>

    <div class="end" id="end">
        <h1 class="end-titel">Congratulations, you have finished the trivia quiz</h1>
        <p class="score-text">Your score: <span id="score">0</span>/5</p>
    </div>

    <div class="start-btn-div">
        <button class="start-btn" id="start-btn">Start Quiz</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
